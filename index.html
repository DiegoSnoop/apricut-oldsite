<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fff6ec">
  <meta name="robots" content="noindex">
  <title>Apricut is moving</title>
  <link rel="icon" href="./logo.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fff6ec;
      color: #5a3a2c;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px 18px;
      background: #fff6ec;
    }

    main {
      width: min(100%, 390px);
      padding: 42px 30px 38px;
      text-align: center;
    }

    .logo {
      display: block;
      width: 104px;
      height: auto;
      margin: 0 auto;
      filter: drop-shadow(0 6px 10px rgba(233, 106, 32, .22));
    }

    .wordmark {
      margin: 14px 0 0;
      color: #5a3a2c;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    h1 {
      margin: 22px 0 5px;
      color: #5a3a2c;
      font-size: 23px;
      line-height: 1.25;
    }

    .new-url {
      margin: 0;
      color: #ff6a3d;
      font-size: 20px;
      font-weight: 800;
    }

    .holding {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 21px;
      padding: 8px 15px;
      border-radius: 999px;
      background: #fff2e6;
      color: #e96a20;
      font-size: 13px;
      font-weight: 650;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ff6a3d;
      animation: pulse 1.3s ease-in-out infinite;
    }

    .note {
      max-width: 280px;
      margin: 22px auto 0;
      color: #916b57;
      font-size: 13px;
      line-height: 1.55;
    }

    .try-link {
      display: inline-block;
      margin-top: 21px;
      padding: 10px;
      color: #e96a20;
      font-size: 14px;
      font-weight: 650;
      text-decoration: none;
    }

    .try-link:hover,
    .try-link:focus-visible { text-decoration: underline; }

    @keyframes pulse {
      0%, 100% { opacity: .35; transform: scale(.85); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    @media (prefers-reduced-motion: reduce) {
      .dot { animation: none; }
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="./logo.svg" alt="">
    <p class="wordmark">Apricut</p>
    <h1>We’re moving to</h1>
    <p class="new-url">apricut.app</p>
    <p class="holding"><span class="dot" aria-hidden="true"></span>Finishing the move — live shortly</p>
    <p class="note">You’ll need to sign in again and re-add Apricut to your Home Screen from the new address.</p>
    <a class="try-link" href="https://apricut.app/">Try apricut.app now →</a>
  </main>
</body>
</html>
