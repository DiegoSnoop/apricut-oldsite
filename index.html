<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fff6ec">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="5; url=https://apricut.app/">
  <link rel="canonical" href="https://apricut.app/">
  <title>Apricut has moved</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fff6ec;
      color: #5a3a2c;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px 18px;
      background: #fff6ec;
    }

    main {
      width: min(100%, 390px);
      padding: 42px 30px 38px;
      text-align: center;
    }

    .logo {
      display: block;
      width: 104px;
      height: auto;
      margin: 0 auto;
      filter: drop-shadow(0 6px 10px rgba(233, 106, 32, .22));
    }

    .wordmark {
      margin: 14px 0 0;
      color: #5a3a2c;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    h1 {
      margin: 22px 0 5px;
      color: #5a3a2c;
      font-size: 23px;
      line-height: 1.25;
    }

    .new-url {
      margin: 0;
      color: #ff6a3d;
      font-size: 20px;
      font-weight: 800;
    }

    .ring-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      margin: 24px auto 0;
    }

    .ring-wrap svg { transform: rotate(-90deg); }

    .ring-number {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #e96a20;
      font-size: 34px;
      font-weight: 800;
    }

    .ring-caption {
      margin: 12px 0 0;
      color: #916b57;
      font-size: 13px;
    }

    .button {
      display: inline-block;
      margin-top: 25px;
      padding: 13px 25px;
      border-radius: 999px;
      background: #ff6a3d;
      box-shadow: 0 6px 14px rgba(255, 106, 61, .35);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
    }

    .button:hover,
    .button:focus-visible { background: #e96a20; }

    .note {
      max-width: 280px;
      margin: 22px auto 0;
      color: #916b57;
      font-size: 13px;
      line-height: 1.55;
    }

    @media (prefers-reduced-motion: reduce) {
      #progress { display: none; }
    }
  </style>
</head>
<body>
  <main>
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="-11 -15.2 535.7 636.3" role="img" aria-label="Apricut">
      <defs>
        <clipPath id="left-piece"><path d="M161 166 L240 177 L202 307 L158 436 L132 479 L-2 524 L20 262 Z"></path></clipPath>
        <clipPath id="right-piece"><path d="M302 177 L374 167 L468 284 L467 459 L428 498 L372 431 L334 306 Z"></path></clipPath>
        <clipPath id="bottom-piece"><path d="M197 457 L342 457 L371 530 L267 598 L168 530 Z"></path></clipPath>
      </defs>
      <g transform="rotate(-21 240 322)">
        <g>
          <path d="M260 169 C226 151 198 119 193 75 C225 87 248 118 260 169 Z" fill="#34a95a"></path>
          <path d="M260 169 C273 102 322 52 397 47 C386 112 337 157 260 169 Z" fill="#25a457"></path>
          <path d="M260 169 C300 127 344 86 397 47 C389 104 352 145 260 169 Z" fill="#167a4d"></path>
          <path d="M260 169 C273 102 322 52 397 47 C340 60 291 106 260 169 Z" fill="#58b747"></path>
        </g>
        <g clip-path="url(#left-piece)" stroke="#e96a20" stroke-width="1" stroke-linejoin="round">
          <rect x="-10" y="158" width="260" height="378" fill="#ee5a2b"></rect>
          <polygon points="20,262 161,166 240,177 218,263" fill="#ffad27"></polygon>
          <polygon points="161,166 240,177 218,263" fill="#ff8f27"></polygon>
          <polygon points="20,262 218,263 159,308" fill="#f47a23"></polygon>
          <polygon points="20,262 159,308 101,389" fill="#dc4d2b"></polygon>
          <polygon points="159,308 218,263 158,436 101,389" fill="#eb5428"></polygon>
          <polygon points="-2,524 20,262 101,389 96,456" fill="#f05d24"></polygon>
          <polygon points="-2,524 96,456 132,479" fill="#d93c2b"></polygon>
        </g>
        <g clip-path="url(#right-piece)" stroke="#e96a20" stroke-width="1" stroke-linejoin="round">
          <rect x="294" y="158" width="183" height="350" fill="#ef5b2a"></rect>
          <polygon points="302,177 374,167 468,284 335,273" fill="#ffad2a"></polygon>
          <polygon points="302,177 374,167 335,273" fill="#ff8c25"></polygon>
          <polygon points="335,273 468,284 428,329" fill="#f27922"></polygon>
          <polygon points="335,273 428,329 372,431" fill="#ea5528"></polygon>
          <polygon points="428,329 468,284 467,459 443,425" fill="#f05f24"></polygon>
          <polygon points="372,431 443,425 428,498" fill="#d9402b"></polygon>
        </g>
        <g stroke="#e76622" stroke-width="1" stroke-linejoin="round">
          <polygon points="267,276 267,398 218,398" fill="#e6532c"></polygon>
          <polygon points="267,276 316,398 267,398" fill="#f57424"></polygon>
        </g>
        <g clip-path="url(#bottom-piece)" stroke="#e76a20" stroke-width="1" stroke-linejoin="round">
          <rect x="160" y="450" width="220" height="156" fill="#f47a23"></rect>
          <polygon points="197,457 267,457 238,497 168,530" fill="#d9472c"></polygon>
          <polygon points="267,457 342,457 371,530 302,497" fill="#df4b29"></polygon>
          <polygon points="168,530 238,497 267,598" fill="#e6582a"></polygon>
          <polygon points="238,497 267,457 302,497 267,598" fill="#f47a23"></polygon>
          <polygon points="302,497 371,530 267,598" fill="#f26d22"></polygon>
        </g>
      </g>
    </svg>
    <p class="wordmark">Apricut</p>
    <h1>Apricut has moved to</h1>
    <p class="new-url">apricut.app</p>
    <div class="ring-wrap" aria-hidden="true">
      <svg width="96" height="96" viewBox="0 0 96 96">
        <circle cx="48" cy="48" r="42" fill="none" stroke="#ffe0cf" stroke-width="7"/>
        <circle id="progress" cx="48" cy="48" r="42" fill="none" stroke="#ff6a3d" stroke-width="7"
          stroke-linecap="round" stroke-dasharray="263.9" stroke-dashoffset="0"/>
      </svg>
      <span class="ring-number" id="seconds">5</span>
    </div>
    <p class="ring-caption" aria-live="polite">Redirecting automatically…</p>
    <a class="button" href="https://apricut.app/">Go to apricut.app now</a>
    <p class="note">Update your bookmark, and re-add Apricut to your Home Screen from the new address.</p>
  </main>
  <script>
    (() => {
      const destination = 'https://apricut.app/';
      const circumference = 263.9;
      const secondsElement = document.getElementById('seconds');
      const progressElement = document.getElementById('progress');
      let seconds = 5;

      const timer = window.setInterval(() => {
        seconds -= 1;
        secondsElement.textContent = String(Math.max(seconds, 0));
        progressElement.setAttribute('stroke-dashoffset', String(circumference * (5 - seconds) / 5));

        if (seconds <= 0) {
          window.clearInterval(timer);
          window.location.replace(destination);
        }
      }, 1000);
    })();
  </script>
</body>
</html>
